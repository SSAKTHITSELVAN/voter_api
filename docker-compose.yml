version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: voter_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: voter_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: voter_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voter_user -d voter_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: voter_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voter_user:strongpassword@db:5432/voter_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
